name: OWASP ZAP — DAST

# Dynamic Application Security Testing.
# This workflow spins up the demo Flask app inside the GitHub Actions
# runner, then points OWASP ZAP at it. No local setup needed.

on:
  workflow_dispatch:        # run manually from the Actions tab
  push:
    branches: [master]

jobs:
  zap-baseline:
    name: ZAP baseline (passive)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start the demo app in the background
        run: |
          # Bind to 0.0.0.0 so ZAP (running on the same host but in a
          # different process tree) can reach it reliably.
          FLASK_HOST=0.0.0.0 nohup python app.py > app.log 2>&1 &
          # Wait for the app to be up
          for i in $(seq 1 15); do
            if curl -sSf http://127.0.0.1:5000/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app to start... ($i/15)"
            sleep 1
          done
          echo "App did not start in time"
          cat app.log
          exit 1

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:5000"
          # Open a GitHub Issue with the findings (one per run).
          allow_issue_writing: true
          # Don't fail the workflow when ZAP finds problems —
          # otherwise the build always goes red (which is the whole point
          # of this demo, but it's noisy in class).
          fail_action: false
